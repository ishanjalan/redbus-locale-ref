<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>redBus · International Locale Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #D0021B;
    --red-dim: #f7e5e7;
    --ink: #111;
    --ink2: #444;
    --ink3: #777;
    --rule: #e5e5e5;
    --bg: #f9f8f6;
    --surface: #ffffff;
    --surface2: #f4f3f0;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --india: #FF9933;
    --india-dim: #fff7ee;
    --covered: #d4edda;
    --covered-text: #1a5c2a;
    --missing: #fde8e8;
    --missing-text: #8b1a1a;
    --partial: #fff3cd;
    --partial-text: #7a4f00;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: white;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.01em;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
  }

  .logo-sep { color: #555; margin: 0 4px; }

  .header-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: #888;
    letter-spacing: 0.05em;
  }

  /* ── LAYOUT ── */
  .shell {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 52px);
  }

  /* ── SIDEBAR ── */
  nav {
    background: var(--surface);
    border-right: 1px solid var(--rule);
    padding: 1.5rem 0;
    position: sticky;
    top: 52px;
    height: calc(100vh - 52px);
    overflow-y: auto;
  }

  .nav-section {
    padding: 0 1.25rem;
    margin-bottom: 1.5rem;
  }

  .nav-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--ink3);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    padding-left: 0.5rem;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--ink2);
    font-size: 13px;
    transition: background 0.12s, color 0.12s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: var(--sans);
  }

  .nav-item:hover { background: var(--surface2); color: var(--ink); }
  .nav-item.active { background: var(--red-dim); color: var(--red); font-weight: 500; }

  .nav-item.india-btn { border-top: 1px solid var(--rule); margin-top: 0.5rem; padding-top: 0.75rem; }

  .flag { font-size: 16px; line-height: 1; }

  .compare-toggle {
    margin: 0 1.25rem;
    margin-top: 1rem;
    padding: 10px 12px;
    background: var(--india-dim);
    border: 1px solid #f0d5b0;
    border-radius: 8px;
  }

  .compare-toggle label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 12px;
    color: #7a4f00;
    font-weight: 500;
  }

  .compare-toggle input[type=checkbox] { accent-color: var(--india); }

  /* ── MAIN ── */
  main {
    padding: 2rem 2.5rem;
    max-width: 960px;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--rule);
  }

  .page-header h1 {
    font-size: 22px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .page-header .sub {
    color: var(--ink3);
    font-size: 13px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 2rem;
  }

  .tab {
    padding: 8px 18px;
    font-size: 13px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--ink3);
    font-family: var(--sans);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.12s, border-color 0.12s;
  }

  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 500; }

  /* ── SECTION ── */
  .section { display: none; }
  .section.active { display: block; }

  /* ── INDIA COMPARE STRIP ── */
  .india-strip {
    display: none;
    background: var(--india-dim);
    border: 1px solid #f0d5b0;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }

  .india-strip.visible { display: block; }

  .india-strip-header {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.06em;
    color: #a06020;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .india-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0.75rem;
  }

  .india-cell {
    background: white;
    border-radius: 6px;
    padding: 8px 10px;
    border: 1px solid #f0d5b0;
  }

  .india-cell-label {
    font-size: 10px;
    font-family: var(--mono);
    color: #a06020;
    letter-spacing: 0.04em;
    margin-bottom: 2px;
    text-transform: uppercase;
  }

  .india-cell-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
  }

  .india-cell-sub {
    font-size: 11px;
    color: var(--ink3);
    margin-top: 2px;
  }

  /* ── INFO GRID ── */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 1rem 1.25rem;
  }

  .info-card-label {
    font-size: 10px;
    font-family: var(--mono);
    letter-spacing: 0.06em;
    color: var(--ink3);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .info-card-value {
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    font-family: var(--mono);
  }

  .info-card-sub {
    font-size: 12px;
    color: var(--ink3);
    margin-top: 4px;
  }

  .info-card-note {
    font-size: 11px;
    color: var(--ink3);
    background: var(--surface2);
    border-radius: 5px;
    padding: 5px 8px;
    margin-top: 8px;
    line-height: 1.5;
  }

  /* ── TABLE ── */
  .ref-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .ref-table th {
    text-align: left;
    font-size: 10px;
    font-family: var(--mono);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink3);
    padding: 6px 12px;
    border-bottom: 1px solid var(--rule);
    font-weight: 400;
  }

  .ref-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
  }

  .ref-table tr:last-child td { border-bottom: none; }
  .ref-table tr:hover td { background: var(--surface2); }

  .ref-table .mono { font-family: var(--mono); font-size: 12px; }

  .ref-table .example {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }

  .ref-table .note {
    font-size: 11px;
    color: var(--ink3);
    margin-top: 2px;
    line-height: 1.4;
  }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .table-title {
    padding: 10px 12px;
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.06em;
    color: var(--ink3);
    text-transform: uppercase;
    border-bottom: 1px solid var(--rule);
    background: var(--surface2);
  }

  /* ── BADGES ── */
  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-family: var(--mono);
    font-weight: 500;
  }

  .badge-covered { background: var(--covered); color: var(--covered-text); }
  .badge-missing { background: var(--missing); color: var(--missing-text); }
  .badge-partial { background: var(--partial); color: var(--partial-text); }
  .badge-india { background: var(--india-dim); color: #8a5000; border: 1px solid #f0d5b0; }

  /* ── FONT SECTION ── */
  .font-stack {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .font-row {
    display: grid;
    grid-template-columns: 160px 1fr auto;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    gap: 1rem;
  }

  .font-row:last-child { border-bottom: none; }

  .font-script-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
  }

  .font-script-sub {
    font-size: 11px;
    color: var(--ink3);
    margin-top: 1px;
  }

  .font-sample {
    font-size: 18px;
    color: var(--ink);
    line-height: 1.4;
  }

  /* ── CODE BLOCK ── */
  .code-block {
    background: #1a1a1a;
    color: #e8e8e8;
    border-radius: 8px;
    padding: 1rem 1.25rem;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    overflow-x: auto;
    margin-bottom: 1rem;
  }

  .code-block .cm { color: #666; }
  .code-block .ck { color: #c5a5f5; }
  .code-block .cs { color: #86d9b2; }
  .code-block .cn { color: #f4a261; }

  /* ── PHONE REGEX ── */
  .regex-cell {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink3);
    word-break: break-all;
    line-height: 1.5;
  }

  /* ── DIFF HIGHLIGHT ── */
  .diff-same { color: var(--ink3); }
  .diff-diff { color: var(--red); font-weight: 500; }

  /* ── LOCALE CODE TAG ── */
  .locale-tag {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--rule);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    padding: 1px 6px;
    color: var(--ink2);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    .shell { grid-template-columns: 1fr; }
    nav { display: none; }
    .info-grid { grid-template-columns: 1fr; }
    main { padding: 1rem; }
  }


  .num-right { color: #1a5c2a; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .num-wrong { color: #c0392b; font-family: 'DM Mono', monospace; font-size: 13px; text-decoration: line-through; }
  .os-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .os-label { font-size: 12px; color: var(--ink2); min-width: 140px; }
  .os-track { flex: 1; background: var(--surface2); border-radius: 3px; height: 20px; overflow: hidden; }
  .os-fill { height: 100%; border-radius: 3px; display: flex; align-items: center; padding: 0 8px; }
  .os-pct { font-size: 11px; font-weight: 500; color: white; white-space: nowrap; }
  .device-alert { background: #fff8e6; border: 1px solid #f0c66e; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #7a4f00; margin-bottom: 1rem; line-height: 1.6; }
  .payment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 10px; padding: 12px; background: var(--surface); }
  .payment-card { background: var(--surface2); border: 1px solid var(--rule); border-radius: 8px; padding: 10px 12px; }
  .payment-name { font-weight: 500; font-size: 13px; color: var(--ink); }
  .payment-type { font-size: 11px; color: var(--ink3); margin-top: 2px; }
  .payment-rank { font-size: 10px; margin-top: 6px; padding: 2px 7px; border-radius: 3px; display: inline-block; font-family: 'DM Mono', monospace; }
  .rank-1 { background: #fef3c7; color: #92400e; }
  .rank-2 { background: var(--surface2); color: var(--ink3); border: 1px solid var(--rule); }

  /* ── ANIMATIONS ── */
  .section.active { animation: fadein 0.18s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ── TAB SCROLL (prevents wrap on narrow screens) ── */
  .tabs { overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { white-space: nowrap; flex-shrink: 0; }

  /* ── MOBILE MARKET SELECT ── */
  .mobile-market-select { display: none; padding: 0.75rem 1rem; border-bottom: 1px solid var(--rule); background: var(--surface); }
  .mobile-market-select select { width: 100%; padding: 8px 10px; border: 1px solid var(--rule); border-radius: 6px; font-family: var(--sans); font-size: 14px; background: var(--bg); color: var(--ink); }
  @media (max-width: 700px) { .mobile-market-select { display: block; } }

  /* ── MESSAGING TAB ── */
  .msg-app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 12px; background: var(--surface); }
  .msg-app-card { background: var(--surface2); border: 1px solid var(--rule); border-radius: 8px; padding: 10px 12px; }
  .msg-app-name { font-weight: 500; font-size: 13px; color: var(--ink); }
  .msg-app-share { font-size: 11px; color: var(--ink3); margin-top: 2px; }
  .msg-app-note { font-size: 11px; color: var(--ink2); margin-top: 6px; line-height: 1.5; }
  .warn-box { background: #fff8e6; border: 1px solid #f0c66e; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #7a4f00; margin-bottom: 1rem; line-height: 1.6; }

  /* ── ADDRESS FORMAT ── */
  .addr-example { font-family: var(--mono); font-size: 12px; background: var(--surface2); border-radius: 6px; padding: 8px 10px; margin: 6px 0; line-height: 1.6; color: var(--ink); }
  .addr-field { display: inline-block; background: var(--red-dim); color: var(--red); font-size: 10px; font-family: var(--mono); padding: 1px 5px; border-radius: 3px; margin: 1px; }

  /* ── TEXT EXPANSION ── */
  .expansion-bar-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .expansion-bar { height: 18px; border-radius: 3px; display: flex; align-items: center; padding: 0 8px; font-size: 11px; font-weight: 500; color: white; white-space: nowrap; min-width: 40px; }
</style>
</head>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    redBus <span class="logo-sep">/</span> International Locale Reference
  </div>
  <div class="header-meta">Design + DesignOps · v1.1 · Apr 2026</div>
</header>

<div class="shell">

<!-- ── SIDEBAR ── -->
<nav>
  <div class="nav-section">

    <button class="nav-item active" data-market="sg" onclick="selectMarket('sg', event)"><span class="flag">🇸🇬</span> Singapore</button>

    <button class="nav-item" data-market="id" onclick="selectMarket('id', event)"><span class="flag">🇮🇩</span> Indonesia</button>
    <button class="nav-item" data-market="kh" onclick="selectMarket('kh', event)"><span class="flag">🇰🇭</span> Cambodia</button>
    <button class="nav-item" data-market="vn" onclick="selectMarket('vn', event)"><span class="flag">🇻🇳</span> Vietnam</button>
  </div>
  <div class="nav-section">
    <div class="nav-label">LatAm</div>
    <button class="nav-item" data-market="co" onclick="selectMarket('co', event)"><span class="flag">🇨🇴</span> Colombia</button>
    <button class="nav-item" data-market="pe" onclick="selectMarket('pe', event)"><span class="flag">🇵🇪</span> Peru</button>
  </div>
  <div class="compare-toggle">
    <label>
      <input type="checkbox" id="compareToggle" onchange="toggleIndia()">
      Compare with 🇮🇳 India
    </label>
  </div>
</nav>

<!-- ── MOBILE MARKET SELECT ── -->
<div class="mobile-market-select">
  <select onchange="selectMarketFromSelect(this.value)">
    <optgroup label="SEA">
      <option value="sg">🇸🇬 Singapore</option>
      <option value="my">🇲🇾 Malaysia</option>
      <option value="id">🇮🇩 Indonesia</option>
      <option value="kh">🇰🇭 Cambodia</option>
      <option value="vn">🇻🇳 Vietnam</option>
    </optgroup>
    <optgroup label="LatAm">
      <option value="co">🇨🇴 Colombia</option>
      <option value="pe">🇵🇪 Peru</option>
    </optgroup>
  </select>
</div>

<!-- ── MAIN ── -->
<main id="main"></main>

</div>

let currentMarket = 'sg';
let showIndia = false;

function selectMarket(code, e) {
  currentMarket = code;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  if (e && e.currentTarget) e.currentTarget.classList.add('active');
  const sel = document.querySelector('.mobile-market-select select');
  if (sel) sel.value = code;
  renderMarket();
}

function selectMarketFromSelect(code) {
  currentMarket = code;
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.market === code);
  });
  renderMarket();
}

function toggleIndia() {
  showIndia = document.getElementById('compareToggle').checked;
  renderMarket();
}

function diff(intlVal, indiaVal) {
  if (intlVal === indiaVal) return `<span class="diff-same">${intlVal}</span>`;
  return `<span class="diff-diff">${intlVal}</span>`;
}

        <tr><td>India primary channels</td><td>WhatsApp (~75% penetration), SMS, and increasingly RCS. Google Pay / PhonePe use WhatsApp for payment alerts. Transactional SMS is deeply ingrained.</td></tr>
        <tr><td>Key difference</td><td>In India, SMS is still a primary notification/OTP channel alongside WhatsApp. In SEA & LatAm, WhatsApp is often the first choice over SMS.</td></tr>
      </table>
    </div>
  `;
}

function renderAddress(code) {
  const d = ADDRESS_DATA[code];
  if (!d) return '';
  return `
    <div class="table-wrap">
      <div class="table-title">Address format</div>
      <table class="ref-table">
        <tr><th>Field order</th><th></th></tr>
        ${d.fields.map((f,i)=>`<tr><td class="mono" style="color:var(--ink3);width:30px">${i+1}</td><td style="font-size:13px">${f}</td></tr>`).join('')}
      </table>
    </div>
    <div class="table-wrap">
      <div class="table-title">Example address</div>
      <div class="addr-example">${d.example.replace(/\n/g,'<br>')}</div>
      <div style="padding:8px 12px;font-size:12px;color:var(--ink3);background:var(--surface);border-top:1px solid var(--rule)">${d.postalNote}</div>
    </div>
    <div class="table-wrap">
      <div class="table-title">Form design notes</div>
      <table class="ref-table">
        ${d.notes.map(n=>`<tr><td style="width:1%;white-space:nowrap;vertical-align:top;padding-top:12px;color:var(--ink3)">›</td><td style="font-size:13px;line-height:1.65;padding:10px 12px">${n}</td></tr>`).join('')}
      </table>
    </div>
  `;
}

function renderTextExpansion() {
  return `
    <div class="table-wrap">
      <div class="table-title">Text expansion — English → translated UI copy</div>
      <table class="ref-table">
        <tr><th>Language</th><th>Avg expansion</th><th>Worst case</th><th>Note</th></tr>
        ${TEXT_EXPANSION_DATA.map(d=>`
          <tr>
            <td style="font-weight:500">${d.lang}</td>
            <td>
              ${d.avg !== null ? `
                <div class="expansion-bar-wrap">
                  <div class="expansion-bar" style="width:${Math.max(d.avg*2+20,20)}px;background:${d.color}">+${d.avg}%</div>
                </div>` : '<span style="color:var(--ink3);font-size:12px">N/A</span>'}
            </td>
            <td class="mono" style="color:${d.worst>30?'#c0392b':d.worst>15?'#e67e22':'var(--ink3)'}">
              ${d.worst !== null ? `+${d.worst}%` : 'N/A'}
            </td>
            <td class="note">${d.note}</td>
          </tr>`).join('')}
      </table>
    </div>
    <div class="table-wrap">
      <div class="table-title">Component design rules for text expansion</div>
      <table class="ref-table">
        <tr><td>Buttons / CTAs</td><td>Never use fixed widths on buttons with translated labels. Use min-width + padding. Test all primary CTAs in Spanish (+30%) and Vietnamese (+25%).</td></tr>
        <tr><td>Navigation labels</td><td>Keep nav item labels to 1–2 words in English max. Spanish equivalents will use 2–3 words.</td></tr>
        <tr><td>Toast / error messages</td><td>Design toasts and error banners to expand vertically. A 1-line English error can be 2–3 lines in Spanish.</td></tr>
        <tr><td>Table cells</td><td>Avoid fixed-width cells for translated content. Use min-width and allow wrapping.</td></tr>
        <tr><td>Khmer-specific</td><td>Khmer is not about character count — it's about line height. Every container with Khmer text needs 1.9× line-height minimum.</td></tr>
      </table>
    </div>
  `;
}

function renderCalendarSection(code) {
  const d = CALENDAR_DATA[code];
  if (!d) return '';
  return `
    <div class="table-wrap">
      <div class="table-title">Calendar — date picker configuration</div>
      <table class="ref-table">
        <tr>
          <td style="width:200px">First day of week</td>
          <td>
            <strong style="${d.firstDay==='Monday'?'color:#c0392b':''}">${d.firstDay}</strong>
            ${d.firstDay==='Monday'?'<span class="badge badge-missing" style="margin-left:8px">Differs from other markets</span>':''}
          </td>
        </tr>
        <tr><td>Day name abbreviations</td><td class="mono" style="font-size:12px">${d.dayNames}</td></tr>
        <tr><td>ISO 8601 week</td><td>${d.isoWeek ? 'Yes — Mon-first' : 'No — Sun-first (consumer standard)'}</td></tr>
        <tr><td>Notes</td><td class="note">${d.note}</td></tr>
      </table>
    </div>
  `;
}

function renderMarket() {
  const m = MARKETS[currentMarket];
  const activeTab = document.querySelector('.tab.active')?.dataset?.tab || 'currency';
  const main = document.getElementById('main');

  const indiaStrip = showIndia ? `
    <div class="india-strip visible">
      <div class="india-strip-header">🇮🇳 India baseline</div>
      <div class="india-grid">
        <div class="india-cell">
          <div class="india-cell-label">Currency</div>
          <div class="india-cell-value">₹</div>
          <div class="india-cell-sub">INR · Prefix, no space</div>
        </div>
        <div class="india-cell">
          <div class="india-cell-label">Example</div>
          <div class="india-cell-value">₹1,23,456</div>
          <div class="india-cell-sub">Lakh/crore system</div>
        </div>
        <div class="india-cell">
          <div class="india-cell-label">Time</div>
          <div class="india-cell-value">12h</div>
          <div class="india-cell-sub">IST (UTC+5:30)</div>
        </div>
        <div class="india-cell">
          <div class="india-cell-label">Phone</div>
          <div class="india-cell-value">+91</div>
          <div class="india-cell-sub">98765 43210</div>
        </div>
        <div class="india-cell">
          <div class="india-cell-label">Locale tag</div>
          <div class="india-cell-value" style="font-size:13px">en-IN</div>
          <div class="india-cell-sub">ICU currency: INR</div>
        </div>
        <div class="india-cell">
          <div class="india-cell-label">Script</div>
          <div class="india-cell-value" style="font-size:13px">Latin + Regional</div>
          <div class="india-cell-sub">Devanagari, Tamil etc.</div>
        </div>
      </div>
    </div>` : '';

  main.innerHTML = `
    <div class="page-header">
      <h1>${m.flag} ${m.name} <span class="locale-tag">${m.locale}</span></h1>
      <div class="sub">ICU currency code: <strong>${m.currency}</strong> · Timezone: ${m.timezone}${currentMarket==='kh' ? ' · <span class="badge badge-missing" style="vertical-align:middle">Mon-first calendar</span>' : ''}${m.usdUsed ? ' · <span class="badge badge-partial" style="vertical-align:middle">Dual currency (USD + KHR)</span>' : ''}</div>
    </div>

    ${indiaStrip}

    <div class="tabs">
      <button class="tab ${activeTab==='currency'?'active':''}" data-tab="currency" onclick="switchTab('currency')">Currency</button>
      <button class="tab ${activeTab==='datetime'?'active':''}" data-tab="datetime" onclick="switchTab('datetime')">Date &amp; Time</button>
      <button class="tab ${activeTab==='phone'?'active':''}" data-tab="phone" onclick="switchTab('phone')">Phone</button>
      <button class="tab ${activeTab==='fonts'?'active':''}" data-tab="fonts" onclick="switchTab('fonts')">Fonts &amp; Script</button>
      <button class="tab ${activeTab==='icu'?'active':''}" data-tab="icu" onclick="switchTab('icu')">ICU / Code</button>
      <button class="tab ${activeTab==='numbers'?'active':''}" data-tab="numbers" onclick="switchTab('numbers')">Numbers</button>
      <button class="tab ${activeTab==='names'?'active':''}" data-tab="names" onclick="switchTab('names')">Names &amp; Forms</button>
      <button class="tab ${activeTab==='payments'?'active':''}" data-tab="payments" onclick="switchTab('payments')">Payments</button>
      <button class="tab ${activeTab==='messaging'?'active':''}" data-tab="messaging" onclick="switchTab('messaging')">Messaging</button>
      <button class="tab ${activeTab==='a11y'?'active':''}" data-tab="a11y" onclick="switchTab('a11y')">Accessibility</button>
      <button class="tab ${activeTab==='devices'?'active':''}" data-tab="devices" onclick="switchTab('devices')">Devices &amp; Browsers</button>
    </div>

    <div id="tab-currency" class="section ${activeTab==='currency'?'active':''}">
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-label">Symbol</div>
          <div class="info-card-value">${m.currencySymbol}</div>
          <div class="info-card-sub">${m.currency} · ${m.currencyPosition}</div>
          ${showIndia ? `<div class="info-card-note">India uses ₹ (INR) · ${diff(m.currencySymbol, '₹')} vs ₹</div>` : ''}
        </div>
        <div class="info-card">
          <div class="info-card-label">Formatted example</div>
          <div class="info-card-value" style="font-size:16px">${m.currencyExample.split('·')[0].trim()}</div>
          <div class="info-card-sub">${m.sep}</div>
          ${showIndia ? `<div class="info-card-note">India: ₹1,23,456 (lakh system — grouping differs)</div>` : ''}
        </div>
      </div>
      <div class="table-wrap">
        <div class="table-title">Currency reference</div>
        <table class="ref-table">
          <tr><th>Property</th><th>Value</th>${showIndia ? '<th>India</th>' : ''}</tr>
          <tr>
            <td>ISO code</td>
            <td class="mono">${m.currency}</td>
            ${showIndia ? '<td class="mono diff-diff">INR</td>' : ''}
          </tr>
          <tr>
            <td>UI symbol</td>
            <td class="mono">${m.currencySymbol}</td>
            ${showIndia ? `<td class="mono ${m.currencySymbol==='₹'?'diff-same':'diff-diff'}">₹</td>` : ''}
          </tr>
          <tr>
            <td>Position</td>
            <td>${m.currencyPosition}</td>
            ${showIndia ? `<td class="${m.currencyPosition==='Prefix, no space'?'diff-same':'diff-diff'}">Prefix, no space</td>` : ''}
          </tr>
          <tr>
            <td>Thousands sep</td>
            <td class="mono">${m.sep.split('·')[0].trim()}</td>
            ${showIndia ? `<td class="mono">, (comma)</td>` : ''}
          </tr>
          <tr>
            <td>Decimal sep</td>
            <td class="mono">${m.sep.split('·')[1]?.trim() || '—'}</td>
            ${showIndia ? `<td class="mono">. (period)</td>` : ''}
          </tr>
          <tr>
            <td>Grouping system</td>
            <td>${currentMarket==='id'||currentMarket==='vn'||currentMarket==='co' ? '<span class="badge badge-partial">Period thousands · 1.234.567</span>' : 'Western — 1,234,567'}</td>
            ${showIndia ? `<td class="diff-diff">South Asian — 1,23,456 (lakh grouping)</td>` : ''}
          </tr>
          <tr>
            <td>Decimals shown</td>
            <td>${currentMarket==='kh'||currentMarket==='vn'||currentMarket==='id' ? 'No — no meaningful subunit' : 'Yes — 2 decimal places'}</td>
            ${showIndia ? `<td>Yes — 2 decimal places</td>` : ''}
          </tr>
        </table>
      </div>
      ${m.currencyNote ? `<div class="table-wrap"><div class="info-card-note" style="border-radius:0;background:var(--surface);padding:12px 16px;">⚠ ${m.currencyNote}</div></div>` : ''}
      ${m.usdUsed ? `<div class="table-wrap" style="border-color:#f0c66e;"><div class="table-title" style="background:#fff8e6;color:#7a4f00;">USD co-currency</div><div style="padding:12px 16px;font-size:13px;background:var(--surface);">${m.usdNote}</div></div>` : ''}
    </div>

    <div id="tab-datetime" class="section ${activeTab==='datetime'?'active':''}">
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-label">Time convention</div>
          <div class="info-card-value">${m.timeFormat.includes('24')&&m.timeFormat.includes('12') ? '12h / 24h' : m.timeFormat.includes('24') ? '24h' : '12h'}</div>
          <div class="info-card-sub">${m.timeFormat}</div>
          ${showIndia ? `<div class="info-card-note">India: 12h dominant ${diff(m.timeFormat, '12h dominant')}</div>` : ''}
        </div>
        <div class="info-card">
          <div class="info-card-label">Timezone</div>
          <div class="info-card-value" style="font-size:15px">${m.timezone.split('·')[0].trim()}</div>
          <div class="info-card-sub">${m.timezone}</div>
          ${showIndia ? `<div class="info-card-note">India: IST (UTC+5:30) · ${diff(m.timezone.split('(')[1]?.replace(')','').trim(), 'UTC+5:30')}</div>` : ''}
        </div>
      </div>
      <div class="table-wrap">
        <div class="table-title">Date formats</div>
        <table class="ref-table">
          <tr><th>Format</th><th>Example</th><th>Use when</th></tr>
          <tr><td>Primary (short)</td><td class="example">3 Sep</td><td class="note">Default in UI</td></tr>
          <tr><td>Extended</td><td class="example">3 Sep 2025<br>Wed, 3 Sep</td><td class="note">Year ≠ current year / Calendar views</td></tr>
          <tr><td>Range, same month</td><td class="example">3–4 Sep</td><td class="note">Multi-day trips</td></tr>
          <tr><td>Range, cross-month</td><td class="example">3 Sep–4 Jan 2026</td><td class="note">Show year when crossing</td></tr>
        </table>
      </div>
      <div class="table-wrap">
        <div class="table-title">Time formats</div>
        <table class="ref-table">
          <tr><th>Format</th><th>24h</th><th>12h</th></tr>
          <tr><td>Time only</td><td class="example">20:15</td><td class="example">8:15 PM</td></tr>
          <tr><td>Time range</td><td class="example">20:15–00:15</td><td class="example">8:15 PM–12:15 AM</td></tr>
          <tr><td>Compact (date·time)</td><td class="example">3 Sep · 20:15</td><td class="example">3 Sep · 8:15 PM</td></tr>
          <tr><td>Extended</td><td class="example">Wed, 3 Sep 2025 · 20:15</td><td class="example">Wed, 3 Sep 2025 · 8:15 PM</td></tr>
        </table>
      </div>
      <div class="table-wrap">
        <div class="table-title">Rules</div>
        <table class="ref-table">
          <tr><td>AM/PM</td><td>Always uppercase. No periods (PM not P.M.)</td></tr>
          <tr><td>Timezone in UI</td><td>Only when cross-timezone context is needed. Use abbreviation: SGT, WIB, ICT, COT, PET</td></tr>
          <tr><td>DST</td><td>${m.dst ? '⚠ Observed — handle clock changes' : 'Not observed — no DST offset changes'} ${currentMarket==='co'||currentMarket==='pe' ? '· <strong>Note: Colombia/Peru do not observe DST — affects timestamp arithmetic</strong>' : ''}</td></tr>
          <tr><td>Numeric dates</td><td>Avoid — dd/mm/yyyy vs mm/dd/yyyy ambiguity. Use "3 Sep" format.</td></tr>
        </table>
      </div>
      ${renderCalendarSection(currentMarket)}
    </div>

    <div id="tab-phone" class="section ${activeTab==='phone'?'active':''}">
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-label">Local format</div>
          <div class="info-card-value" style="font-size:16px">${m.phone}</div>
          <div class="info-card-sub">Use spaces. No parentheses, no dashes.</div>
        </div>
        <div class="info-card">
          <div class="info-card-label">With country code</div>
          <div class="info-card-value" style="font-size:16px">${m.phoneCC}</div>
          ${showIndia ? `<div class="info-card-sub">India: +91 98765 43210</div>` : ''}
        </div>
      </div>
      <div class="table-wrap">
        <div class="table-title">Validation regex</div>
        <table class="ref-table">
          <tr><th>Pattern</th><th>Regex</th></tr>
          <tr>
            <td>With/without country code</td>
            <td class="regex-cell">${m.phoneRegex}</td>
          </tr>
        </table>
      </div>
      <div class="table-wrap">
        <div class="table-title">Input UX rules</div>
        <table class="ref-table">
          <tr><td>Display format</td><td>Spaces for readability. No dashes, no parentheses.</td></tr>
          <tr><td>Country code entry</td><td>Accept with or without country code. Strip leading zero before applying country code if detected.</td></tr>
          <tr><td>Validation timing</td><td>Validate on blur, not on keystroke. Users paste numbers in varied formats.</td></tr>
          <tr><td>Placeholder</td><td>Use local format as placeholder: <span class="mono">${m.phone}</span></td></tr>
        </table>
      </div>
    </div>

    <div id="tab-fonts" class="section ${activeTab==='fonts'?'active':''}">
      <div class="table-wrap">
        <div class="table-title">Script &amp; font requirements</div>
        <table class="ref-table">
          <tr>
            <td style="width:180px">Primary script</td>
            <td>${m.script}</td>
            ${showIndia ? `<td>Latin + Devanagari + regional scripts</td>` : ''}
          </tr>
          <tr>
            <td>Required fonts</td>
            <td>${m.fonts}</td>
            ${showIndia ? `<td>Inter + Noto Sans family</td>` : ''}
          </tr>
          <tr>
            <td>Font gaps</td>
            <td>
              ${m.fontGap.length === 0
                ? '<span class="badge badge-covered">Fully covered by Inter</span>'
                : m.fontGap.map(g => `<span class="badge badge-missing">${g}</span>`).join(' ')}
            </td>
            ${showIndia ? `<td><span class="badge badge-india">India fonts already in system</span></td>` : ''}
          </tr>
        </table>
      </div>
      ${currentMarket === 'kh' ? `
      <div class="table-wrap" style="border-color:#f0c66e;">
        <div class="table-title" style="background:#fff8e6;color:#7a4f00;">Khmer rendering notes</div>
        <table class="ref-table">
          <tr><td>Line height</td><td>Set to 1.8–2× Latin baseline. Stacking consonants are 3 layers tall.</td></tr>
          <tr><td>Font size parity</td><td>Noto Sans Khmer at 16px reads smaller than Inter at 16px. Bump Khmer 1–2px.</td></tr>
          <tr><td>OS fallback risk</td><td>Do not rely on system font fallback — it produces a different font on every platform. Explicitly assign Noto Sans Khmer.</td></tr>
          <tr><td>Numerals</td><td>Khmer numerals (០–៩) exist but Arabic numerals are standard in digital UI.</td></tr>
        </table>
      </div>` : ''}
      ${currentMarket === 'vn' ? `
      <div class="table-wrap">
        <div class="table-title">Vietnamese diacritic test characters</div>
        <div style="padding:14px 16px;font-size:22px;line-height:2;background:var(--surface);">
          ắ ặ ẳ ẵ ằ &nbsp; ấ ầ ẩ ẫ ậ &nbsp; ướ ược ưỡ &nbsp; ợ ở ỡ ờ ớ &nbsp; ệ ề ế ể ễ
          <div style="font-size:13px;color:var(--ink3);margin-top:8px;">Worst cases: ợ ướ ặ ầ ệ — test at 12px, 14px, bold weight</div>
        </div>
      </div>` : ''}
      <div class="table-wrap">
        <div class="table-title">Notes</div>
        <div style="padding:12px 16px;font-size:13px;background:var(--surface);color:var(--ink2);line-height:1.7;">${m.notes}</div>
      </div>
      ${renderTextExpansion()}
    </div>

    <div id="tab-icu" class="section ${activeTab==='icu'?'active':''}">
      <div class="table-wrap">
        <div class="table-title">ICU config</div>
        <table class="ref-table">
          <tr><th>Key</th><th>Value</th></tr>
          <tr><td>BCP 47 locale</td><td class="mono">${m.icuLocale}</td></tr>
          <tr><td>ISO 4217 currency</td><td class="mono">${m.icuCurrency}</td></tr>
          <tr><td>Currency display</td><td class="mono">narrowSymbol</td></tr>
        </table>
      </div>
      <div class="table-wrap">
        <div class="table-title">JavaScript (Intl)</div>
        <div class="code-block">
<span class="cm">// Currency</span>
<span class="ck">new</span> Intl.<span class="cs">NumberFormat</span>(<span class="cs">'${m.icuLocale}'</span>, {
  <span class="ck">style</span>: <span class="cs">'currency'</span>,
  <span class="ck">currency</span>: <span class="cs">'${m.icuCurrency}'</span>,
  <span class="ck">currencyDisplay</span>: <span class="cs">'narrowSymbol'</span>,
}).<span class="cs">format</span>(<span class="cn">1234.56</span>);

<span class="cm">// Date</span>
<span class="ck">new</span> Intl.<span class="cs">DateTimeFormat</span>(<span class="cs">'${m.icuLocale}'</span>, {
  <span class="ck">day</span>: <span class="cs">'numeric'</span>,
  <span class="ck">month</span>: <span class="cs">'short'</span>,
}).<span class="cs">format</span>(<span class="ck">new</span> <span class="cs">Date</span>());

<span class="cm">// Phone input — strip and reformat</span>
<span class="ck">const</span> raw = input.<span class="cs">replace</span>(<span class="cn">/[^\\d+]/g</span>, <span class="cs">''</span>);
</div>
      </div>
      <div class="table-wrap">
        <div class="table-title">Android / Kotlin</div>
        <div class="code-block">
<span class="ck">val</span> formatter = NumberFormat
  .<span class="cs">getCurrencyInstance</span>(Locale(<span class="cs">"${m.icuLocale.split('-')[0]}"</span>, <span class="cs">"${m.icuLocale.split('-')[1]}"</span>))
formatter.currency = Currency.<span class="cs">getInstance</span>(<span class="cs">"${m.icuCurrency}"</span>)
formatter.<span class="cs">format</span>(<span class="cn">1234.56</span>)
</div>
      </div>
      <div class="table-wrap">
        <div class="table-title">iOS / Swift</div>
        <div class="code-block">
<span class="ck">let</span> formatter = NumberFormatter()
formatter.numberStyle = .<span class="cs">currency</span>
formatter.locale = Locale(identifier: <span class="cs">"${m.icuLocale.replace('-','_')}"</span>)
formatter.currencyCode = <span class="cs">"${m.icuCurrency}"</span>
formatter.<span class="cs">string</span>(from: <span class="cn">1234.56</span>)
</div>
      </div>
    </div>

    <div id="tab-numbers" class="section ${activeTab==='numbers'?'active':''}">
      ${renderNumbers(m, currentMarket, showIndia)}
    </div>
    <div id="tab-names" class="section ${activeTab==='names'?'active':''}">
      ${renderNames(m, currentMarket)}
      ${renderAddress(currentMarket)}
    </div>
    <div id="tab-payments" class="section ${activeTab==='payments'?'active':''}">
      ${renderPayments(currentMarket)}
    </div>
    <div id="tab-messaging" class="section ${activeTab==='messaging'?'active':''}">
      ${renderMessaging(currentMarket)}
    </div>
    <div id="tab-a11y" class="section ${activeTab==='a11y'?'active':''}">
      ${renderA11y(currentMarket)}
    </div>
    <div id="tab-devices" class="section ${activeTab==='devices'?'active':''}">
      ${renderDevices(currentMarket)}
    </div>
  `;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === `tab-${tab}`));
}

// Initial render
renderMarket();
</script>
</body>
</html>
